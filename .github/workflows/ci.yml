name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-asyncio hypothesis sqlalchemy structlog
        
    - name: Run Pytest
      run: |
        pytest tests/
        
  adversarial-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Run Garak/PyRIT Adversarial Suite
      run: |
        pip install garak pytest sqlalchemy structlog
        export LITELLM_LOG="DEBUG"
        # Simulate local LLM gateway for testing
        garak --model_name openai/gpt-3.5-turbo --probes prompt_injection -g 1
        
        # Run specific injection unit tests
        pytest tests/adversarial/ -v
        
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Linting Tools
      run: |
        pip install ruff mypy sqlalchemy structlog
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Type check with Mypy (strict on critical modules)
      run: |
        mypy core/swarm.py core/critic.py core/artifacts.py core/scheduler.py core/reconciler.py

  formal-verification:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Download TLA+ Tools
      run: |
        cd specifications
        chmod +x download_tools.sh
        ./download_tools.sh
        
    - name: Verify TLA+ Specifications (TLC Model Checker)
      run: |
        cd specifications
        java -cp tla2tools.jar tlc2.TLC LeaseProtocol.tla
        java -cp tla2tools.jar tlc2.TLC SchedulerReconciler.tla
        java -cp tla2tools.jar tlc2.TLC S3CommitProtocol.tla
        java -cp tla2tools.jar tlc2.TLC SwarmLivelock.tla
