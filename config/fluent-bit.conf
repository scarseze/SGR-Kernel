[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    Http_Server  On
    Http_Port    2020

[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224

[OUTPUT]
    Name              es
    Match             *
    Host              elasticsearch
    Port              9200
    Index             sgr_logs
    Type              _doc
    Logstash_Format   On
    Logstash_Prefix   sgr
    Retry_Limit       False
