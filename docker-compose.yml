services:
  sgr_proxy:
    build: ./proxy
    container_name: sgr_proxy
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    restart: always

  sgr-kernel:
    build: .
    container_name: sgr_kernel
    depends_on:
      - sgr_redis
      - sgr_qdrant
      - sgr_proxy
    env_file:
      - ../.env # Connect to parent .env
    environment:
      - PROXY_URL=http://sgr_proxy:8000
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - QDRANT_HOST=sgr_qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://sgr_redis:6379/0
      - LOG_FORMAT=json
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACE_SAMPLE_RATE=1.0
    volumes:
      - ./memory.db:/app/memory.db
      - ./generated_files:/app/generated_files
      - ../refs:/app/refs # Mount references directory
      # Data Mounts for RAG
      - ./data:/mnt/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" # Access host localhost for Ollama
    ports:
      - "8501:8501"
      - "8001:8001" # Prometheus metrics port
    # logging:
    #   driver: "fluentd"
    #   options:
    #     fluentd-address: "127.0.0.1:24224"
    #     fluentd-async-connect: "true"
    #     tag: "sgr.kernel"
    command: [ "chainlit", "run", "ui_app.py", "--port", "8501", "--host", "0.0.0.0" ]
    restart: always
    tty: true
    stdin_open: true

  sgr-worker:
    build: .
    container_name: sgr_worker
    depends_on:
      - sgr_redis
      - sgr_qdrant
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=sgr_redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://sgr_redis:6379/0
      - QDRANT_HOST=sgr_qdrant
      - QDRANT_PORT=6333
      - TASK_QUEUE_TYPE=redis
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PYTHONUNBUFFERED=1
      - LANG=C.UTF-8
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACE_SAMPLE_RATE=1.0
    volumes:
      - ./memory.db:/app/memory.db
      - ./generated_files:/app/generated_files
      - ../refs:/app/refs
      - ./data:/mnt/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    # logging:
    #   driver: "fluentd"
    #   options:
    #     fluentd-address: "127.0.0.1:24224"
    #     fluentd-async-connect: "true"
    #     tag: "sgr.worker"
    command: [ "python", "run_worker.py" ]
    ports:
      - "8002:8002" # Prometheus metrics port for worker

  sgr_qdrant:
    image: qdrant/qdrant:latest
    container_name: sgr_qdrant
    ports:
      - "6343:6333" # Changed to 6343 because local_qdrant takes 6333-6334
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  sgr_redis:
    image: redis:alpine
    container_name: sgr_redis
    ports:
      - "6380:6379" # Changed to 6380 to avoid conflict
    restart: always

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # Web UI
      - "4317:4317" # OTLP gRPC
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: sgr_elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: sgr_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: always

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: sgr_fluent_bit
    volumes:
      - ./config/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
    restart: always
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus:latest
    container_name: sgr_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: sgr_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    restart: always

  optuna-dashboard:
    image: ghcr.io/optuna/optuna-dashboard:latest
    container_name: sgr_optuna_dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./generated_files:/app/generated_files
    # Optuna will monitor the SQLite DB that PEFTlab creates in generated_files
    command: [ "sqlite:////app/generated_files/peftlab.db", "--host", "0.0.0.0", "--port", "8080" ]
    restart: always

volumes:
  qdrant_data:
  es_data:
  prometheus_data:
  grafana_data:
