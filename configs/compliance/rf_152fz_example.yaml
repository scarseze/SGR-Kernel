# configs/compliance/rf_152fz_example.yaml
# Set COMPLIANCE_LEVEL=rf_152fz in your environment

compliance_level: rf_152fz

# Data Localization (ст. 18 152-ФЗ)
data_localization:
  primary_storage_region: "ru-central1"
  backup_storage_region: "ru-central1"
  cross_border_transfer: false
  geo_fence_enabled: true

# PII Patterns для маскировки (с учётом российских реалий)
pii_patterns:
  passport_rf: "\\b\\d{4}\\s?\\d{6}\\b"
  inn_individual: "\\b\\d{12}\\b"
  snils: "\\b\\d{3}-\\d{3}-\\d{3}\\s?\\d{2}\\b"
  phone_ru: "\\+7[\\s\\-]?\\(?\\d{3}\\)?[\\s\\-]?\\d{3}[\\s\\-]?\\d{2}[\\s\\-]?\\d{2}"
  email: "[\\w.-]+@[\\w.-]+\\.[a-zA-Z]{2,}"
  bank_card_rf: "\\b\\d{4}[\\s\\-]?\\d{4}[\\s\\-]?\\d{4}[\\s\\-]?\\d{4}\\b"
  bik: "\\b\\d{9}\\b"

# Согласие и права субъекта (ст. 9, 14, 21 152-ФЗ)
consent_management:
  require_explicit_consent: true
  consent_record_logging: true
  subject_rights_endpoint: "/api/v1/subject-rights"
  deletion_sla_hours: 72

# Аудит и отчётность (ст. 18.1, Приказ ФСТЭК №21)
audit_requirements:
  log_retention_days: 1825
  log_integrity_protection: true
  roscomnadzor_notification: true
  access_review_period_days: 90

# Криптография (Приказ ФСБ №378)
cryptography:
  gost_cipher_enabled: true
  gost_hash_enabled: true
  crypto_providers:
    - "cryptopro"
    - "vipnet"
  key_storage: "hsm_ru_certified"

# Классификация ИСПДн (Постановление №1119)
ispdn_classification:
  level: "УЗ-2"
  special_category_data: false
  biometric_data: false

memory:
  db_url: "postgresql://user:pass@ru-central-host/sgr_sessions"
  session_ttl_days: 1825
  auto_summarization: true
  max_messages_before_compression: 15
